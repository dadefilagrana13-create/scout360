<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scout360 — AI Sports Scouting</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  body { font-family: 'Inter', system-ui, sans-serif; background: #05090f; color: #e2e8f0; }
  .glass { background: rgba(255,255,255,0.04); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); }
  .gradient-text { background: linear-gradient(135deg, #3b82f6, #8b5cf6, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .btn { background: linear-gradient(135deg, #3b82f6, #8b5cf6); border: none; padding: 10px 24px; border-radius: 10px; cursor: pointer; font-weight: 600; color: white; transition: all 0.2s; }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(59,130,246,0.4); }
  input, textarea, select { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px 14px; color: #e2e8f0; width: 100%; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: #3b82f6; }
  .player-card { background: linear-gradient(145deg, rgba(59,130,246,0.08), rgba(139,92,246,0.05)); border: 1px solid rgba(59,130,246,0.2); border-radius: 16px; padding: 20px; transition: all 0.3s; }
  .player-card:hover { border-color: rgba(59,130,246,0.5); transform: translateY(-3px); box-shadow: 0 15px 30px rgba(59,130,246,0.15); }
  .stat-bar { height: 5px; background: rgba(255,255,255,0.08); border-radius: 3px; }
  .stat-fill { height: 100%; border-radius: 3px; transition: width 1s; }
  .shortlisted { border-color: rgba(234,179,8,0.5) !important; background: linear-gradient(145deg, rgba(234,179,8,0.08), rgba(234,179,8,0.03)) !important; }
  .tab-active { background: rgba(59,130,246,0.2); border-bottom: 2px solid #3b82f6; }
</style>
</head>
<body>
<nav class="glass sticky top-0 z-50 px-6 py-4 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-600 to-purple-600 flex items-center justify-center text-xl">⚽</div>
    <div><h1 class="font-black text-xl gradient-text">Scout360</h1><p class="text-xs text-slate-400">AI Sports Scouting</p></div>
  </div>
  <div class="flex gap-2">
    <button onclick="showTab('players')" id="tab-players" class="px-4 py-2 rounded-lg text-sm font-medium tab-active transition-all">Players</button>
    <button onclick="showTab('shortlist')" id="tab-shortlist" class="px-4 py-2 rounded-lg text-sm font-medium transition-all"><i class="fas fa-star mr-1 text-yellow-400"></i>Shortlist</button>
    <button onclick="showTab('analyze')" id="tab-analyze" class="px-4 py-2 rounded-lg text-sm font-medium transition-all"><i class="fas fa-robot mr-1"></i>AI Report</button>
  </div>
</nav>

<div class="max-w-7xl mx-auto px-6 py-8">
  <!-- PLAYERS -->
  <div id="panel-players">
    <div class="flex justify-between items-center mb-6">
      <div><h2 class="text-2xl font-bold">Player Database</h2><p class="text-slate-400 text-sm">Scout and track talent</p></div>
      <button onclick="toggleForm('player-form')" class="btn"><i class="fas fa-user-plus mr-2"></i>Add Player</button>
    </div>

    <div id="player-form" class="hidden glass rounded-2xl p-6 mb-6">
      <h3 class="font-semibold text-lg mb-4 gradient-text">New Player Card</h3>
      <div class="grid grid-cols-4 gap-4">
        <div class="col-span-2"><label class="text-xs text-slate-400 mb-1 block">Full Name *</label><input id="p-name" placeholder="Player name"></div>
        <div><label class="text-xs text-slate-400 mb-1 block">Age</label><input id="p-age" type="number" placeholder="19"></div>
        <div><label class="text-xs text-slate-400 mb-1 block">Sport</label>
          <select id="p-sport"><option>Football</option><option>Basketball</option><option>Volleyball</option><option>Tennis</option><option>Athletics</option></select>
        </div>
        <div><label class="text-xs text-slate-400 mb-1 block">Position</label><input id="p-pos" placeholder="e.g. Striker, Playmaker"></div>
        <div><label class="text-xs text-slate-400 mb-1 block">Club</label><input id="p-club" placeholder="Current club"></div>
        <div><label class="text-xs text-slate-400 mb-1 block">Nationality</label><input id="p-nat" placeholder="e.g. Italian"></div>
        <div><label class="text-xs text-slate-400 mb-1 block">Video URL</label><input id="p-video" placeholder="YouTube/highlight link"></div>
      </div>
      <div class="mt-4">
        <p class="text-xs text-slate-400 mb-3 font-medium">ATTRIBUTES (0-99)</p>
        <div class="grid grid-cols-5 gap-3">
          <div><label class="text-xs text-slate-500 mb-1 block">Pace</label><input id="p-pace" type="number" min="0" max="99" placeholder="75"></div>
          <div><label class="text-xs text-slate-500 mb-1 block">Shooting</label><input id="p-shoot" type="number" min="0" max="99" placeholder="70"></div>
          <div><label class="text-xs text-slate-500 mb-1 block">Passing</label><input id="p-pass" type="number" min="0" max="99" placeholder="80"></div>
          <div><label class="text-xs text-slate-500 mb-1 block">Defending</label><input id="p-def" type="number" min="0" max="99" placeholder="60"></div>
          <div><label class="text-xs text-slate-500 mb-1 block">Physical</label><input id="p-phys" type="number" min="0" max="99" placeholder="72"></div>
        </div>
      </div>
      <div class="mt-4"><label class="text-xs text-slate-400 mb-1 block">Scout Notes</label><textarea id="p-notes" rows="2" placeholder="Observations, potential, areas to improve..."></textarea></div>
      <div class="flex gap-3 mt-4">
        <button onclick="savePlayer()" class="btn"><i class="fas fa-save mr-2"></i>Save Player</button>
        <button onclick="toggleForm('player-form')" class="px-4 py-2 text-slate-400 hover:text-white text-sm transition-colors">Cancel</button>
      </div>
    </div>

    <!-- Filters -->
    <div class="flex gap-3 mb-6">
      <select id="filter-sport" onchange="loadPlayers()" class="w-40">
        <option value="">All Sports</option>
        <option>Football</option><option>Basketball</option><option>Volleyball</option>
      </select>
      <input id="filter-search" onkeyup="loadPlayers()" placeholder="Search player..." class="w-64">
    </div>

    <div id="players-grid" class="grid grid-cols-3 gap-5"></div>
  </div>

  <!-- SHORTLIST -->
  <div id="panel-shortlist" class="hidden">
    <div class="mb-6"><h2 class="text-2xl font-bold"><i class="fas fa-star text-yellow-400 mr-2"></i>My Shortlist</h2><p class="text-slate-400 text-sm">Top prospects you're tracking</p></div>
    <div id="shortlist-grid" class="grid grid-cols-3 gap-5"></div>
  </div>

  <!-- AI ANALYZE -->
  <div id="panel-analyze" class="hidden">
    <div class="mb-6"><h2 class="text-2xl font-bold">AI Scouting Report</h2><p class="text-slate-400 text-sm">Generate detailed player analysis</p></div>
    <div class="grid grid-cols-2 gap-6">
      <div class="glass rounded-2xl p-6">
        <div class="space-y-4">
          <div><label class="text-xs text-slate-400 mb-1 block">Player Name & Position</label><input id="ai-player" placeholder="e.g. Marco Rossi, Left Winger, 19 years"></div>
          <div><label class="text-xs text-slate-400 mb-1 block">Stats & Performance</label><textarea id="ai-stats" rows="4" placeholder="Goals: 15, Assists: 8, Speed: fast, Technique: high, Work rate: medium..."></textarea></div>
          <div><label class="text-xs text-slate-400 mb-1 block">Target Role / Club Level</label><input id="ai-target" placeholder="e.g. Serie B starter, Champions League squad..."></div>
          <button onclick="generateReport()" class="btn w-full"><i class="fas fa-brain mr-2"></i>Generate AI Report</button>
        </div>
      </div>
      <div class="glass rounded-2xl p-6">
        <h3 class="font-semibold mb-4 gradient-text">Scouting Report</h3>
        <div id="ai-report" class="text-slate-400 text-sm flex flex-col items-center justify-center h-40 opacity-50">
          <span class="text-4xl mb-3">⚽</span><p>Enter player data to generate report</p>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="fixed bottom-6 right-6 px-6 py-3 rounded-xl font-semibold hidden z-50 text-white"></div>

<script>
const SUPABASE_URL = 'https://nmulrsbqdeqokvrybapn.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5tdWxyc2JxZGVxb2t2cnliYXBuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyODY0NDcsImV4cCI6MjA5NDg2MjQ0N30.iGN_OGVkw0j3VCEi9qUroMbpT37P3UPRUf1cYyqFBys'
const GROQ_KEY = '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'
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className=`fixed bottom-6 right-6 px-6 py-3 rounded-xl font-semibold z-50 text-white ${type==='error'?'bg-red-600':'bg-blue-600'}`;setTimeout(()=>t.classList.add('hidden'),3000)}
function toggleForm(id){document.getElementById(id).classList.toggle('hidden')}
function showTab(tab){['players','shortlist','analyze'].forEach(t=>{document.getElementById(`panel-${t}`).classList.add('hidden');document.getElementById(`tab-${t}`).classList.remove('tab-active')});document.getElementById(`panel-${tab}`).classList.remove('hidden');document.getElementById(`tab-${tab}`).classList.add('tab-active');if(tab==='players')loadPlayers();if(tab==='shortlist')loadShortlist()}

function statColor(v){if(v>=85)return '#22c55e';if(v>=70)return '#3b82f6';if(v>=55)return '#f59e0b';return '#ef4444'}
function calcOverall(p){const stats=[p.pace,p.shooting,p.passing,p.physical,p.defending].filter(Boolean);return stats.length?Math.round(stats.reduce((a,b)=>a+b,0)/stats.length):0}

function renderPlayerCard(p,extra=''){
  const ov=calcOverall(p)
  const stats=[{l:'PAC',v:p.pace},{l:'SHO',v:p.shooting},{l:'PAS',v:p.passing},{l:'DEF',v:p.defending},{l:'PHY',v:p.physical}].filter(s=>s.v)
  return `<div class="player-card ${p.shortlisted?'shortlisted':''}">
    <div class="flex justify-between items-start mb-3">
      <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-blue-600 to-purple-700 flex items-center justify-center text-2xl font-black text-white">${ov||'?'}</div>
      <div class="flex gap-2">
        <button onclick="toggleShortlist('${p.id}',${p.shortlisted})" class="text-lg ${p.shortlisted?'text-yellow-400':'text-slate-600 hover:text-yellow-400'} transition-colors"><i class="fas fa-star"></i></button>
        <button onclick="deleteRec('s360_players','${p.id}',loadPlayers)" class="text-slate-600 hover:text-red-400 transition-colors"><i class="fas fa-trash text-sm"></i></button>
      </div>
    </div>
    <h3 class="font-bold text-lg">${p.name}</h3>
    <p class="text-sm text-blue-400 font-medium">${p.position||''} · ${p.sport||''}</p>
    <div class="flex gap-3 text-xs text-slate-400 mt-1 mb-3">
      ${p.age?`<span>${p.age} yrs</span>`:''}
      ${p.club?`<span>${p.club}</span>`:''}
      ${p.nationality?`<span>${p.nationality}</span>`:''}
    </div>
    ${stats.length?`<div class="space-y-1.5">${stats.map(s=>`<div class="flex items-center gap-2 text-xs"><span class="w-8 text-slate-400 font-bold">${s.l}</span><div class="stat-bar flex-1"><div class="stat-fill" style="width:${s.v}%;background:${statColor(s.v)}"></div></div><span class="w-6 text-right font-bold" style="color:${statColor(s.v)}">${s.v}</span></div>`).join('')}</div>`:''}
    ${p.notes?`<p class="text-xs text-slate-500 mt-3 italic">"${p.notes.substring(0,80)}..."</p>`:''}
    ${p.video_url?`<a href="${p.video_url}" target="_blank" class="block mt-2 text-xs text-blue-400 hover:underline"><i class="fas fa-play mr-1"></i>Watch Highlights</a>`:''}
    ${extra}
  </div>`
}

async function savePlayer(){
  const d={name:document.getElementById('p-name').value,age:parseInt(document.getElementById('p-age').value)||null,sport:document.getElementById('p-sport').value,position:document.getElementById('p-pos').value,club:document.getElementById('p-club').value,nationality:document.getElementById('p-nat').value,video_url:document.getElementById('p-video').value,pace:parseInt(document.getElementById('p-pace').value)||null,shooting:parseInt(document.getElementById('p-shoot').value)||null,passing:parseInt(document.getElementById('p-pass').value)||null,defending:parseInt(document.getElementById('p-def').value)||null,physical:parseInt(document.getElementById('p-phys').value)||null,notes:document.getElementById('p-notes').value,shortlisted:false}
  if(!d.name){showToast('Name required','error');return}
  d.overall=calcOverall(d)
  const{error}=await sb.from('s360_players').insert(d)
  if(error){showToast('Error: '+error.message,'error');return}
  showToast('✅ Player added!');toggleForm('player-form');loadPlayers()
}

async function loadPlayers(){
  const sport=document.getElementById('filter-sport').value,search=document.getElementById('filter-search').value
  let q=sb.from('s360_players').select('*').order('created_at',{ascending:false})
  if(sport)q=q.eq('sport',sport)
  const{data}=await q
  const filtered=search?data.filter(p=>p.name.toLowerCase().includes(search.toLowerCase())):data
  const grid=document.getElementById('players-grid')
  if(!filtered?.length){grid.innerHTML='<div class="col-span-3 glass rounded-xl p-8 text-center text-slate-400"><span class="text-4xl block mb-3">⚽</span>No players found</div>';return}
  grid.innerHTML=filtered.map(p=>renderPlayerCard(p)).join('')
}

async function loadShortlist(){
  const{data}=await sb.from('s360_players').select('*').eq('shortlisted',true).order('created_at',{ascending:false})
  const grid=document.getElementById('shortlist-grid')
  if(!data?.length){grid.innerHTML='<div class="col-span-3 glass rounded-xl p-8 text-center text-slate-400"><i class="fas fa-star text-4xl block mb-3 opacity-30"></i>No players shortlisted yet</div>';return}
  grid.innerHTML=data.map(p=>renderPlayerCard(p)).join('')
}

async function toggleShortlist(id,current){
  await sb.from('s360_players').update({shortlisted:!current}).eq('id',id)
  loadPlayers()
}

async function generateReport(){
  const player=document.getElementById('ai-player').value,stats=document.getElementById('ai-stats').value,target=document.getElementById('ai-target').value
  if(!player){showToast('Fill player info','error');return}
  document.getElementById('ai-report').innerHTML='<div class="flex items-center gap-3 text-blue-400"><div class="animate-spin rounded-full h-6 w-6 border-b-2 border-blue-400"></div><span>Generating report...</span></div>'
  try{
    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'user',content:`You are a professional football/sports scout. Write a detailed scouting report.\n\nPLAYER: ${player}\nSTATS & OBSERVATIONS: ${stats}\nTARGET LEVEL: ${target||'Professional'}\n\nReport structure:\n1. OVERALL RATING (/100)\n2. KEY STRENGTHS (3 points)\n3. WEAKNESSES (2 points)\n4. POTENTIAL CEILING\n5. RECOMMENDED ROLE\n6. TRANSFER VALUE estimate\n7. VERDICT (Sign Now / Monitor / Pass)\n\nBe specific and professional.`}]})})
    const data=await res.json()
    document.getElementById('ai-report').innerHTML=`<div class="text-sm text-slate-300 whitespace-pre-line leading-relaxed">${(data.choices?.[0]?.message?.content||'').replace(/\*\*(.*?)\*\*/g,'<strong class="text-blue-400">$1</strong>').replace(/\n/g,'<br>')}</div>`
  }catch(e){document.getElementById('ai-report').innerHTML='<p class="text-red-400">Error: '+e.message+'</p>'}
}

async function deleteRec(table,id,reload){if(!confirm('Delete?'))return;await sb.from(table).delete().eq('id',id);reload()}
loadPlayers()
</script>
</body>
</html>
